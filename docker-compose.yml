version: '3.5'
services:
  db:
    container_name: 'actifai-takehome-db'
    image: postgres:14
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: actifai
    volumes:
      - ./postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 1s
      retries: 20
      start_period: 3s
      timeout: 2s
  api:
    container_name: 'actifai-takehome-api'
    build:
      context: ./
      dockerfile: Dockerfile_api
    depends_on:
        db:
          condition: service_healthy
          restart: true
    ports:
      - '3000:3000'
    volumes:
      - ./:/usr/src/app
